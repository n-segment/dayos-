<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DayOS</title>
    <link rel="icon" type="image/png" href="./logo.png" />
    <link rel="stylesheet" href="./ui.css?v=15" />
  </head>
  <body>
<div class="dayos-app">
      <header class="app-header">
        <div class="brand-left">
          <button class="music-btn" id="musicBtn" aria-label="음악 재생" aria-pressed="false">♪</button>
        </div>
        <div class="session-badge" id="sessionBadge" role="status" aria-live="polite">대기</div>
        <div class="brand-right">
          <button class="feedback-btn" id="feedbackBtn" aria-label="피드백 보내기">✉</button>
        </div>
      </header>

      <!-- 피드백 모달 -->
      <div class="feedback-modal hidden" id="feedbackModal">
        <div class="feedback-modal__box">
          <div class="feedback-modal__header">
            <p class="feedback-modal__title">피드백 보내기</p>
            <button class="feedback-modal__close" id="feedbackModalClose">×</button>
          </div>
          <textarea class="feedback-modal__textarea" id="feedbackTextarea" placeholder="버그, 개선 아이디어, 뭐든 편하게 적어줘요 :)" rows="4"></textarea>
          <div class="feedback-modal__actions">
            <button class="button button--primary" id="feedbackSendBtn">보내기</button>
          </div>
        </div>
      </div>
      <main class="screen-stack">

        <!-- 0. 로그인 화면 -->
        <section class="screen screen--login is-active" id="loginScreen" aria-label="로그인">
          <video class="welcome-bg-video" autoplay muted loop playsinline aria-hidden="true">
            <source src="./bg.MOV" type="video/mp4">
          </video>
          <div class="login-panel">
            <div class="login-brand">
              <img src="./logo.png" style="width:28px;height:28px;object-fit:contain;border-radius:6px;" />
              <span>DayOs</span>
            </div>
            <h2 class="login-title">오늘 하루도<br>기록해봐요.</h2>
            <button class="button button--start" id="googleLoginBtn">Google로 시작하기 →</button>
          </div>
        </section>

        <!-- 1. 시작 화면 -->
        <section class="screen screen--welcome" id="welcomeScreen" aria-label="홈">
          <video class="welcome-bg-video" autoplay muted loop playsinline aria-hidden="true">
            <source src="./bg.MOV" type="video/mp4">
          </video>
          <div class="welcome-panel">
            <p class="date-chip">
              <span class="date-chip__dot" aria-hidden="true"></span>
              <span id="todayText"></span>
            </p>
            <p class="welcome-panel__eyebrow" id="welcomeEyebrow"></p>
            <p class="welcome-now-time" id="welcomeNowTime"></p>
            <h1 class="welcome-panel__title" id="welcomeTitle"></h1>
            <p class="welcome-panel__description" id="welcomeDesc"></p>
            <div class="welcome-actions">
              <button class="btn-history-link" id="historyLinkButton">기록 보기</button>
              <button class="button button--start" id="startButton">시작하기 →</button>
            </div>
          </div>
        </section>

        <!-- 2. 작업시간 기록 화면 -->
        <section class="screen screen--focus" id="focusScreen" aria-label="작업 기록 중">
          <button class="end-btn-fixed" id="endButtonFixed">기록 보기 →</button>
          <div class="focus-panel">
            <p class="date-chip"><span class="date-chip__dot" aria-hidden="true"></span><span id="focusTodayText"></span></p>
            <p class="focus-panel__meta" id="startedMetaText"></p>
            <p class="focus-panel__time" id="elapsedTimeText">0시간 00분</p>
            <!-- 기록 -->
            <div class="checkin-zone" id="checkinZone">
              <div class="goal-checklist hidden" id="goalChecklist"></div>
              <ul class="checkin-log" id="checkinLog"></ul>
              <div class="checkin-input-wrap hidden" id="checkinInputWrap">
                <textarea class="checkin-textarea" id="checkinTextarea" placeholder="오늘의 목표~"></textarea>
                <div class="checkin-input-actions">
                  <button class="checkin-save-btn" id="checkinSaveBtn">저장</button>
                  <button class="checkin-cancel-btn" id="checkinCancelBtn">취소</button>
                </div>
              </div>
            </div>

            <div class="focus-panel__actions">
              <button class="button button--ghost" id="pauseButton">일시정지</button>
              <button class="button button--ghost" id="addNoteBtn">기록하기</button>
              <button class="button button--primary" id="endButton">작업 끝내기</button>
            </div>
          </div>
        </section>

        <!-- 목표 모달 -->
        <div class="goal-modal hidden" id="goalModal">
          <div class="goal-modal__box">
            <div class="goal-modal__header">
              <p class="goal-modal__title">오늘의 목표</p>
              <button class="goal-modal__close" id="goalModalClose">×</button>
            </div>
            <div class="goal-start-row">
              <label class="goal-field-label">시작 시간</label>
              <input class="goal-start-input" id="goalStartTime" type="text" placeholder="오전 9:00" />
            </div>
            <div class="goal-memo-row">
              <label class="goal-field-label">오늘 목표</label>
              <textarea class="goal-memo-input" id="goalMemo" placeholder="오늘 이루고 싶은 게 뭐야?" rows="2"></textarea>
            </div>
            <div class="goal-tasks" id="goalTasks"></div>
            <button class="goal-add-btn" id="goalAddBtn">+ 추가</button>
            <div class="goal-total-row">
              <span class="goal-total-label">예상 총 시간</span>
              <span class="goal-total-val" id="goalTotalVal">—</span>
            </div>
            <div class="goal-modal__actions">
              <button class="button button--primary" id="goalSaveBtn">저장</button>
            </div>
          </div>
        </div>

        <!-- 회고 모달 -->
        <div class="retro-modal hidden" id="retroModal">
          <div class="retro-modal__box">
            <p class="retro-modal__label">오늘 회고</p>
            <textarea class="retro-modal__textarea" id="retroModalTextarea" placeholder="자유롭게 적어주세요."></textarea>
            <div class="retro-modal__actions">
              <button class="button button--ghost" id="retroSkipBtn">건너뛰기</button>
              <button class="button button--primary" id="retroSaveBtn">저장하고 끝내기</button>
            </div>
          </div>
          </div>
        </section>

        <!-- 3. 작업시간 기록 보기 화면 -->
        <section class="screen screen--summary" id="summaryScreen">
          <div class="summary-panel">
            <p class="summary-panel__eyebrow">오늘 작업시간 확인</p>
            <p class="summary-panel__date" id="summaryDateText"></p>
            <div class="summary-panel__big-time" id="summaryFocusText">0시간 00분</div>
            <!-- 시간별 작업 로그 타임라인 -->
            <div class="timeline-wrap" id="timelineWrap"></div>
            <div class="summary-panel__actions">
              <button class="button button--ghost" id="summaryBackButton">이전으로</button>
              <button class="button button--primary" id="summarySaveButton">〜(￣▽￣〜) oO(끝)</button>
            </div>
          </div>
        </section>

        <!-- 4. 전체 기록 화면 -->
        <section class="screen screen--history" id="historyScreen">
          <div class="history-panel">
            <div class="history-header">
              <button class="btn-back" id="historyBackButton">← 돌아가기</button>
              <p class="history-eyebrow">HISTORY</p>
            </div>
            <div class="history-week-total" id="historyWeekTotal"></div>
            <div class="history-list" id="historyList"></div>
          </div>
        </section>

      </main>

      <footer class="app-footer"></footer>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <iframe id="musicFrame" style="position:fixed;width:200px;height:113px;opacity:0.001;pointer-events:none;bottom:0;left:0;" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <script src="./ui.js"></script>
  </body>
</html>
